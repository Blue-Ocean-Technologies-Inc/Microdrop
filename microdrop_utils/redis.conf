# Disable RDB snapshots
save ""

# Disable AOF (Append-Only File)
appendonly no

# --- Protected mode & bind ---
# protected-mode (requires Redis >= 3.2) rejects external connections when no
# password is set. The Windows port of Redis only goes up to 3.0.501, so
# protected-mode is unavailable there. On that older version, if bind is not
# set, Redis listens on 0.0.0.0 (all interfaces) — effectively no protection.
#
# bind controls which network interfaces Redis listens on:
#   bind 127.0.0.1            -> localhost only (most secure, single-machine use)
#   bind 0.0.0.0              -> all interfaces (needed for LAN/remote access)
#   bind 127.0.0.1 192.168.x.x -> localhost + a specific LAN interface
#
#protected-mode no
#bind 127.0.0.1 192.168.x.x
